add_newline = true
command_timeout = 200
format = "[➜](bold green) $directory$git_branch$git_status$character"

[character]
error_symbol = "[❯](bold red)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
style = "bold cyan"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[  $branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status]($style) )'
style = "yellow"
ahead      = "⇡${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
conflicted = "!"
up_to_date = ""
untracked  = "[?](dimmed white)"
modified   = "[~](yellow)"
stashed    = "[≡](blue)"
staged     = "[+](green)"
renamed    = "[»](blue)"
deleted    = "[-](red)"
